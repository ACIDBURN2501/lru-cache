name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # -------------------------------------------------------------------------
  # Build the library and run the full test suite (debug, both strategies).
  # -------------------------------------------------------------------------
  test:
    name: "Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y ninja-build

      - name: Install ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install meson
        run: pip install meson

      - name: Configure
        run: >
          meson setup build
          --buildtype=debug
          -Dbuild_tests=true

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testlog-${{ matrix.os }}
          path: build/meson-logs/testlog.txt

  # -------------------------------------------------------------------------
  # Verify the library compiles cleanly in release mode for both strategies.
  # -------------------------------------------------------------------------
  release-build:
    name: "Release (${{ matrix.lookup_strategy }})"
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        lookup_strategy: [hash, linear]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install ninja
        run: sudo apt-get update -q && sudo apt-get install -y ninja-build

      - name: Install meson
        run: pip install meson

      - name: Configure
        run: >
          meson setup build
          --buildtype=release
          -Dbuild_tests=false
          -Dlookup_strategy=${{ matrix.lookup_strategy }}

      - name: Build
        run: meson compile -C build
